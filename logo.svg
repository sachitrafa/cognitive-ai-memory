<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#F9FAFB"/>

  <!-- Logo mark — centered -->
  <!-- Base bar -->
  <rect x="120" y="222" width="160" height="20" rx="4" fill="#0A192F"/>
  <!-- Mid bar -->
  <rect x="150" y="192" width="100" height="20" rx="4" fill="#0A192F"/>
  <!-- Left short bar -->
  <rect x="180" y="162" width="30" height="20" rx="4" fill="#0A192F"/>
  <!-- Right cyan accent -->
  <rect x="220" y="162" width="10" height="20" rx="2" fill="#00D4FF"/>
  <!-- Top cyan dot -->
  <rect x="195" y="132" width="10" height="20" rx="2" fill="#00D4FF" fill-opacity="0.6"/>

  <!-- Wordmark -->
  <text
    x="200" y="292"
    text-anchor="middle"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28" font-weight="700" letter-spacing="-1"
    fill="#0A192F"
  >YourMemory</text>

  <!-- Tagline -->
  <text
    x="200" y="320"
    text-anchor="middle"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
