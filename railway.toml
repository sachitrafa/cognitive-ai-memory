[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python memory_mcp.py --sse"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
name = "PORT"
value = "${{PORT}}"

[[deploy.environmentVariables]]
name = "DATABASE_URL"
value = "${{DATABASE_URL}}"
